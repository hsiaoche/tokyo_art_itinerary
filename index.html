<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axis / 多線同步計畫</title>
    <style>
        /* =========================================
           1. Design Tokens (極簡設計變數)
           ========================================= */
        :root {
            --bg-color: #050505;       
            --text-primary: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.4); 
            --line-color: rgba(255, 255, 255, 0.15);
            --accent-color: #ffffff;
            --timeline-width: 220px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.6;
            overflow: hidden; 
        }

        .scroll-container {
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .scroll-container::-webkit-scrollbar { display: none; }

        /* =========================================
           2. Floating Elements (浮動控制項)
           ========================================= */
        /* 系統載入狀態 */
        #loader {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 0.85rem;
            letter-spacing: 4px;
            color: var(--text-muted);
            z-index: 999;
            transition: opacity 0.5s;
        }

        .selector-container {
            position: fixed;
            top: 40px;
            right: 60px;
            z-index: 100;
            display: flex;
            gap: 10px;
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 6px;
            border-radius: 40px;
            border: 1px solid var(--line-color);
            transition: opacity 0.3s, transform 0.3s;
        }

        .selector-container.hidden {
            opacity: 0;
            pointer-events: none;
            transform: translateY(-10px);
            position: absolute; 
        }

        .toggle-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 8px 24px;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            outline: none;
        }

        .toggle-btn:hover { color: var(--text-primary); }
        .toggle-btn.active {
            background: var(--text-primary);
            color: var(--bg-color);
        }

        /* 呼吸燈淨化處理 (純粹正圓) */
        .time-anchor-btn {
            position: fixed;
            bottom: 40px;
            right: 60px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background-color: transparent;
            border: none; /* 移除任何預設邊框，消除X細線 */
            outline: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 100;
        }

        .time-anchor-btn::after {
            content: '';
            display: block;
            width: 10px;
            height: 10px;
            background-color: var(--accent-color);
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(255,255,255,0.8);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.4); }
            70% { box-shadow: 0 0 0 12px rgba(255, 255, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0); }
        }

        /* =========================================
           3. Layout Architecture (左右佈局)
           ========================================= */
        .app-layout {
            display: flex;
            height: 100vh;
            width: 100vw;
            opacity: 0; /* 預設隱藏，待 JSON 載入後淡入 */
            transition: opacity 0.8s ease;
        }

        /* 左側：時間軸 (Axis) */
        .sidebar {
            width: var(--timeline-width);
            height: 100vh;
            border-right: 1px solid var(--line-color);
            display: flex;
            align-items: center;
            padding-left: 50px;
            position: relative;
            z-index: 50;
        }

        .timeline-nav {
            display: flex;
            flex-direction: column;
            position: relative;
            width: 100%;
        }

        .timeline-nav::before {
            content: '';
            position: absolute;
            left: 3px;
            top: 20px;
            bottom: 20px;
            width: 1px;
            background-color: var(--line-color);
            z-index: 0;
        }

        .nav-item {
            position: relative;
            padding: 24px 0 24px 30px;
            text-decoration: none;
            color: var(--text-muted);
            font-size: 1.1rem;
            font-weight: 300;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            z-index: 1;
        }

        .nav-item::before {
            content: '';
            position: absolute;
            left: -1px;
            width: 9px;
            height: 9px;
            background-color: var(--bg-color);
            border: 1px solid var(--text-muted);
            border-radius: 50%;
            transition: all 0.3s;
        }

        .nav-item:hover { color: var(--text-primary); }
        .nav-item:hover::before { border-color: var(--text-primary); }

        .nav-item.active {
            color: var(--text-primary);
            font-size: 1.4rem;
            font-weight: 500;
        }

        .nav-item.active::before {
            background-color: var(--accent-color);
            border-color: var(--accent-color);
            box-shadow: 0 0 12px rgba(255, 255, 255, 0.4);
            transform: scale(1.3);
        }

        /* 右側：全螢幕滾動區 */
        .content-area {
            flex-grow: 1;
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
        }

        .section {
            height: 100vh;
            width: 100%;
            scroll-snap-align: start;
            display: flex;
            align-items: center;
            padding: 0 80px;
            position: relative;
        }

        /* 內部軌道容器 (提供給電腦端並排使用) */
        .section-track {
            display: flex;
            width: 100%;
            gap: 60px;
            max-height: 80vh;
        }

        /* =========================================
           4. Content Styling (內容與排版細節)
           ========================================= */
        .route-content {
            display: none; 
            animation: fadeIn 0.4s ease forwards;
            overflow-y: auto; /* 長文本獨立滾動 */
            padding-right: 15px;
        }
        
        .route-content::-webkit-scrollbar { display: none; }

        /* 透過 body 屬性動態控制顯示狀態 (手機版專用) */
        body[data-active-route="a"] .content-route-a { display: block; }
        body[data-active-route="b"] .content-route-b { display: block; }
        body[data-active-route="shop"] .content-route-shop { display: block; }
        body[data-active-route="intro"] .content-route-intro { display: block; }
        body[data-active-route="dug"] .content-route-dug { display: block; }
        
        /* 交集節點(Sync)不論選什麼路線都顯示 */
        .content-route-all { display: block !important; }

        .time-header {
            font-size: 0.9rem;
            color: var(--text-muted);
            letter-spacing: 3px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            text-transform: uppercase;
        }
        
        .time-header::after {
            content: '';
            display: inline-block;
            width: 40px;
            height: 1px;
            background-color: var(--line-color);
            margin-left: 20px;
        }

        .title {
            font-size: 2.8rem;
            font-weight: 300;
            letter-spacing: 1px;
            margin-bottom: 24px;
            line-height: 1.2;
        }

        .meta-info {
            font-size: 0.85rem;
            color: #888;
            margin-bottom: 24px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            border-left: 1px solid var(--line-color);
            padding-left: 15px;
        }

        .description {
            font-size: 0.95rem;
            font-weight: 300;
            color: var(--text-muted);
            max-width: 500px;
            margin-bottom: 40px;
            line-height: 1.8;
        }

        .btn-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .nav-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 10px 24px;
            border: 1px solid var(--line-color);
            border-radius: 50px;
            color: var(--text-primary);
            text-decoration: none;
            font-size: 0.85rem;
            letter-spacing: 1px;
            transition: all 0.3s;
            background: transparent;
        }

        .nav-btn:hover {
            background: var(--text-primary);
            color: var(--bg-color);
            border-color: var(--text-primary);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* =========================================
           5. 響應式佈局 (電腦端並排 vs 手機端)
           ========================================= */
        
        /* [電腦端] 上帝視角：多軌並排，隱藏切換器 */
        @media (min-width: 900px) {
            .selector-container { display: none !important; }
            .route-content {
                display: block !important; /* 強制全部顯示 */
                flex: 1; /* 均分欄位寬度 */
            }
            .content-route-all {
                flex: 1 1 100%;
                display: flex;
                flex-direction: column;
            }
            /* 交集節點橫向引導線 */
            .content-route-all .title::before {
                content: '';
                display: block;
                width: 100px;
                height: 1px;
                background: var(--accent-color);
                margin-bottom: 20px;
            }
        }

        /* [手機/平板端] 單軌切換 */
        @media (max-width: 899px) {
            .app-layout { flex-direction: column; }
            .sidebar {
                width: 100vw;
                height: auto;
                border-right: none;
                border-bottom: 1px solid var(--line-color);
                padding: 10px 20px;
            }
            .timeline-nav { flex-direction: row; overflow-x: auto; scroll-snap-type: x mandatory; }
            .timeline-nav::before { display: none; }
            .nav-item { padding: 10px 20px; scroll-snap-align: start; }
            .nav-item::before { display: none; }
            .nav-item.active { border-bottom: 2px solid var(--accent-color); padding-bottom: 8px; }

            .selector-container { top: 70px; right: 50%; transform: translateX(50%); width: max-content; }
            .selector-container.hidden { transform: translate(50%, -10px); }

            .time-anchor-btn { bottom: 30px; right: 30px; width: 45px; height: 45px; }

            .section { padding: 0 40px; }
            .section-track { flex-direction: column; }
            .title { font-size: 2.2rem; }
            .description { max-width: 100%; }
        }
    </style>
</head>
<body data-active-route="a" data-active-night-route="shop">

    <div id="loader">SYNCING DATA...</div>

    <div id="day-selector" class="selector-container hidden"></div>
    <div id="night-selector" class="selector-container hidden"></div>

    <button class="time-anchor-btn" onclick="scrollToCurrentTime()" title="返回當下時間"></button>

    <div class="app-layout" id="app-layout">
        <nav class="sidebar scroll-container">
            <div class="timeline-nav" id="timeline-nav">
                </div>
        </nav>
        <main class="content-area scroll-container" id="scroll-area">
            </main>
    </div>

    <script>
        // --- 核心狀態管理 ---
        const state = {
            dayRoute: sessionStorage.getItem('axisDayRoute') || 'a',
            nightRoute: sessionStorage.getItem('axisNightRoute') || 'shop'
        };

        // --- 1. 初始化資料抓取 (Fetch JSON) ---
        document.addEventListener("DOMContentLoaded", () => {
            // 強制加上時間戳記避免快取
            fetch(`data.json?v=${new Date().getTime()}`)
                .then(response => {
                    if(!response.ok) throw new Error("JSON Fetch Failed");
                    return response.json();
                })
                .then(data => {
                    renderUI(data);
                    document.getElementById('loader').style.opacity = '0';
                    setTimeout(() => {
                        document.getElementById('loader').style.display = 'none';
                        document.getElementById('app-layout').style.opacity = '1';
                        initObservers();
                        applySavedState();
                    }, 500);
                })
                .catch(error => {
                    document.getElementById('loader').innerText = "DATA SYNC FAILED.";
                    console.error("載入 JSON 發生錯誤，請確認檔案是否存在並使用 Live Server 運行。", error);
                });
        });

        // --- 2. 介面渲染邏輯 (DOM Generation) ---
        function renderUI(data) {
            // 渲染頂部切換按鈕
            renderSelectors('day-selector', data.config.dayRoutes, 'day');
            renderSelectors('night-selector', data.config.nightRoutes, 'night');

            const navContainer = document.getElementById('timeline-nav');
            const scrollArea = document.getElementById('scroll-area');

            data.schedule.forEach((point, index) => {
                // 渲染左側時間軸
                const navHTML = `<a href="#${point.timeId}" class="nav-item ${index === 0 ? 'active' : ''}">${point.timeLabel}</a>`;
                navContainer.insertAdjacentHTML('beforeend', navHTML);

                // 渲染右側內容區
                let routesHTML = '';
                for (const [routeKey, routeData] of Object.entries(point.routes)) {
                    
                    // 組合 meta 資訊
                    let metaHTML = routeData.meta.map(m => `<span>${m}</span>`).join('');
                    
                    // 組合 按鈕
                    let btnsHTML = routeData.links.map(link => 
                        `<a href="${link.url}" target="_blank" class="nav-btn">${link.label}</a>`
                    ).join('');

                    routesHTML += `
                        <div class="route-content content-route-${routeKey}">
                            <div class="time-header">${point.timeLabel} ${point.action}</div>
                            <h2 class="title">${routeData.title}</h2>
                            <div class="meta-info">${metaHTML}</div>
                            <p class="description">${routeData.description}</p>
                            <div class="btn-group">${btnsHTML}</div>
                        </div>
                    `;
                }

                const sectionHTML = `
                    <section id="${point.timeId}" class="section" data-phase="${point.phase}">
                        <div class="section-track">
                            ${routesHTML}
                        </div>
                    </section>
                `;
                scrollArea.insertAdjacentHTML('beforeend', sectionHTML);
            });
        }

        function renderSelectors(containerId, routesArray, phase) {
            const container = document.getElementById(containerId);
            routesArray.forEach(route => {
                const btn = document.createElement('button');
                btn.className = `toggle-btn`;
                btn.innerText = route.label;
                btn.dataset.route = route.id;
                btn.onclick = (e) => setRoute(route.id, phase, e.target);
                container.appendChild(btn);
            });
        }

        // --- 3. 路線切換與狀態寫入 ---
        function setRoute(routeId, phase, btnElement) {
            // 更新 UI 狀態
            const container = btnElement.parentElement;
            container.querySelectorAll('.toggle-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');

            // 寫入 Body Attribute 控制顯示
            if (phase === 'day') {
                document.body.setAttribute('data-active-route', routeId);
                sessionStorage.setItem('axisDayRoute', routeId);
            } else {
                document.body.setAttribute('data-active-night-route', routeId);
                // 同步綁定到主屬性，方便 CSS 統一控制
                document.body.setAttribute('data-active-route', routeId); 
                sessionStorage.setItem('axisNightRoute', routeId);
            }
        }

        function applySavedState() {
            const savedDayBtn = document.querySelector(`#day-selector .toggle-btn[data-route="${state.dayRoute}"]`);
            if(savedDayBtn) savedDayBtn.classList.add('active');
            
            const savedNightBtn = document.querySelector(`#night-selector .toggle-btn[data-route="${state.nightRoute}"]`);
            if(savedNightBtn) savedNightBtn.classList.add('active');
            
            document.body.setAttribute('data-active-route', state.dayRoute);
        }

        // --- 4. 滾動同步與時間定位 (Intersection Observer) ---
        function initObservers() {
            const sections = document.querySelectorAll(".section");
            const navItems = document.querySelectorAll(".nav-item");
            const scrollArea = document.getElementById("scroll-area");
            const daySelector = document.getElementById("day-selector");
            const nightSelector = document.getElementById("night-selector");

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const id = entry.target.getAttribute("id");
                        const phase = entry.target.getAttribute("data-phase");

                        // 1. 聯動左側選單
                        navItems.forEach(item => item.classList.remove("active"));
                        const activeLink = document.querySelector(`.nav-item[href="#${id}"]`);
                        if (activeLink) activeLink.classList.add("active");

                        // 2. 聯動頂部控制項並套用對應的 Session 狀態
                        if (phase === "day") {
                            daySelector.classList.remove("hidden");
                            nightSelector.classList.add("hidden");
                            document.body.setAttribute('data-active-route', sessionStorage.getItem('axisDayRoute') || 'a');
                        } else if (phase === "night") {
                            daySelector.classList.add("hidden");
                            nightSelector.classList.remove("hidden");
                            document.body.setAttribute('data-active-route', sessionStorage.getItem('axisNightRoute') || 'shop');
                        } else {
                            // return (收束階段)，隱藏選擇器
                            daySelector.classList.add("hidden");
                            nightSelector.classList.add("hidden");
                        }
                    }
                });
            }, { root: scrollArea, rootMargin: "-20% 0px -50% 0px", threshold: 0 });

            sections.forEach(section => observer.observe(section));

            // 左側時間軸點擊平滑滾動
            navItems.forEach(item => {
                item.addEventListener('click', function(e) {
                    e.preventDefault();
                    document.getElementById(this.getAttribute('href').substring(1)).scrollIntoView({ behavior: 'smooth' });
                });
            });
        }

        // --- 5. 時間錨點運算邏輯 ---
        function scrollToCurrentTime() {
            const currentHour = new Date().getHours();
            let targetId = "time-10"; 
            
            if (currentHour >= 22 || currentHour < 4) targetId = "time-22";
            else if (currentHour >= 18) targetId = "time-18";
            else if (currentHour >= 15) targetId = "time-15";
            else if (currentHour >= 13) targetId = "time-13";
            else if (currentHour >= 11) targetId = "time-11";

            const targetSection = document.getElementById(targetId);
            if (targetSection) targetSection.scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
