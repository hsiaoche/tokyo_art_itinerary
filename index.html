<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axis / 多線同步計畫</title>
    <style>
        /* =========================================
           1. Design Tokens (極簡設計變數)
           ========================================= */
        :root {
            --bg-color: #050505;       
            --text-primary: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.4); 
            --line-color: rgba(255, 255, 255, 0.2);
            --accent-color: #ffffff;
            --timeline-desktop-width: 220px;
            --timeline-mobile-width: 90px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.6;
            overflow: hidden; 
        }

        .scroll-container {
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .scroll-container::-webkit-scrollbar { display: none; }

        /* =========================================
           2. 系統狀態與浮動控制區
           ========================================= */
        #loader {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 0.85rem; letter-spacing: 4px; color: var(--text-muted);
            z-index: 999; transition: opacity 0.5s; text-align: center;
        }

        .error-msg { color: #ff5555; margin-bottom: 10px; }
        
        .retry-btn {
            background: transparent; border: 1px solid var(--line-color);
            color: var(--text-primary); padding: 8px 16px; border-radius: 20px;
            cursor: pointer; font-size: 0.8rem; letter-spacing: 2px;
            margin-top: 15px; display: none;
        }

        /* 路線切換器 (Pill Toggle) */
        .selector-container {
            position: fixed; top: 40px; right: 60px; z-index: 100;
            display: flex; gap: 10px;
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            padding: 6px; border-radius: 40px; border: 1px solid var(--line-color);
            transition: opacity 0.3s, transform 0.3s;
        }

        .selector-container.hidden {
            opacity: 0; pointer-events: none;
            transform: translateY(-10px); position: absolute; 
        }

        .toggle-btn {
            background: transparent; border: none; color: var(--text-muted);
            padding: 8px 24px; border-radius: 30px; font-size: 0.9rem;
            font-weight: 500; cursor: pointer; transition: all 0.3s; outline: none;
        }

        .toggle-btn:hover { color: var(--text-primary); }
        .toggle-btn.active { background: var(--text-primary); color: var(--bg-color); }

        /* 右下角呼吸燈 */
        .anchor-wrapper {
            position: fixed; bottom: 40px; right: 60px; z-index: 100;
            display: flex; align-items: center; gap: 15px;
        }

        .micro-copy {
            font-size: 0.75rem; letter-spacing: 2px; color: var(--text-muted);
            transition: opacity 0.5s; pointer-events: none;
        }

        .time-anchor-btn {
            width: 50px; height: 50px; border-radius: 50px;
            background-color: transparent; border: 1px solid transparent; 
            outline: none; display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: border 0.3s;
        }
        .time-anchor-btn:hover { border: 1px solid var(--line-color); }

        .time-anchor-btn::after {
            content: ''; display: block; width: 8px; height: 8px;
            background-color: var(--accent-color); border-radius: 50%;
            box-shadow: 0 0 10px rgba(255,255,255,0.8);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.4); }
            70% { box-shadow: 0 0 0 12px rgba(255, 255, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0); }
        }

        /* =========================================
           3. Layout Architecture (左右佈局與磁吸強化)
           ========================================= */
        .app-layout {
            display: flex; height: 100vh; width: 100vw;
            opacity: 0; transition: opacity 0.8s ease;
        }

        /* 左側：水平線段時間軸 */
        .sidebar {
            width: var(--timeline-desktop-width); height: 100vh;
            display: flex; align-items: center; justify-content: center;
            position: relative; z-index: 50; border-right: 1px solid var(--line-color);
        }

        .timeline-nav {
            display: flex; flex-direction: column; gap: 20px; width: 100%;
        }

        .nav-item {
            text-decoration: none; color: var(--text-muted); padding-left: 30px;
            font-size: 1rem; font-weight: 300; transition: all 0.3s;
            display: flex; align-items: center; gap: 12px; position: relative;
        }

        .nav-item::before {
            content: ''; position: absolute; left: 0; width: 15px; height: 1px;
            background-color: var(--line-color); transition: all 0.3s ease;
        }

        .nav-item:hover { color: var(--text-primary); }
        .nav-item:hover::before { width: 20px; background-color: var(--text-muted); }

        .nav-item.active { color: var(--text-primary); font-size: 1.2rem; font-weight: 500; }
        .nav-item.active::before { width: 30px; height: 2px; background-color: var(--accent-color); }

        /* 右側：全螢幕滾動區 */
        .content-area {
            flex-grow: 1; height: 100vh; overflow-y: scroll; 
            scroll-snap-type: y mandatory; scroll-behavior: smooth;
            
            /* 🚀 關鍵 UX 修復：頂部漸層遮罩 (防止文字重疊按鈕) */
            -webkit-mask-image: linear-gradient(to bottom, transparent 0%, transparent 70px, black 110px, black 100%);
            mask-image: linear-gradient(to bottom, transparent 0%, transparent 70px, black 110px, black 100%);
        }

        .section {
            height: 100vh; width: 100%; flex-shrink: 0; 
            scroll-snap-align: center; /* 🚀 完美置中磁吸 */
            scroll-snap-stop: always; 
            display: flex; align-items: center; padding: 0 80px; position: relative;
        }

        .section-track {
            display: flex; width: 100%; gap: 60px; max-height: 85vh;
        }

        /* =========================================
           4. Content Styling (內容與流程圖排版)
           ========================================= */
        .route-content {
            display: none; animation: fadeIn 0.4s ease forwards;
            /* 🚀 移除了 overflow-y: auto，禁止卡片內部亂滾動導致跑版 */
            padding-right: 15px; width: 100%;
        }

        body[data-active-route="a"] .content-route-a { display: block; }
        body[data-active-route="b"] .content-route-b { display: block; }
        body[data-active-route="shop"] .content-route-shop { display: block; }
        body[data-active-route="intro"] .content-route-intro { display: block; }
        body[data-active-route="dug"] .content-route-dug { display: block; }
        .content-route-all { display: block !important; }

        .time-header {
            font-size: 0.85rem; color: var(--text-muted); letter-spacing: 3px;
            margin-bottom: 16px; display: flex; align-items: center;
        }
        .time-header::after {
            content: ''; display: inline-block; width: 30px; height: 1px;
            background-color: var(--line-color); margin-left: 15px;
        }

        .title {
            font-size: 2.8rem; font-weight: 300; letter-spacing: 1px;
            margin-bottom: 30px; line-height: 1.2;
        }

        .flow-diagram {
            display: flex; align-items: center; flex-wrap: wrap;
            gap: 12px; margin-bottom: 40px;
        }

        .flow-node {
            font-size: 0.85rem; letter-spacing: 1px;
            padding: 8px 16px; border: 1px solid var(--line-color);
            border-radius: 30px; color: var(--text-primary);
        }

        .flow-arrow { width: 20px; height: 1px; background-color: var(--line-color); }

        .meta-info {
            font-size: 0.85rem; color: #888; margin-bottom: 24px;
            display: flex; flex-direction: column; gap: 8px;
            border-left: 1px solid var(--line-color); padding-left: 15px;
        }

        .description {
            font-size: 0.95rem; font-weight: 300; color: var(--text-muted);
            max-width: 500px; margin-bottom: 40px; line-height: 1.8;
            white-space: pre-line;
        }

        .btn-group { display: flex; gap: 15px; flex-wrap: wrap; }

        .nav-btn {
            display: inline-flex; align-items: center; justify-content: center;
            padding: 10px 24px; border: 1px solid var(--line-color);
            border-radius: 50px; color: var(--text-primary); text-decoration: none;
            font-size: 0.85rem; letter-spacing: 1px; transition: all 0.3s;
        }

        .nav-btn:hover { background: var(--text-primary); color: var(--bg-color); border-color: var(--text-primary); }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* =========================================
           5. 響應式佈局 (還原手稿：強制左側時間軸)
           ========================================= */
        @media (min-width: 900px) {
            .selector-container { display: none !important; }
            .route-content { display: block !important; flex: 1; }
            .content-route-all { flex: 1 1 100%; display: flex; flex-direction: column; }
            .content-route-all .title::before {
                content: ''; display: block; width: 100px; height: 1px;
                background: var(--accent-color); margin-bottom: 20px;
            }
        }

        @media (max-width: 899px) {
            .app-layout { flex-direction: row; } /* 保持左右佈局 */
            
            .sidebar { 
                width: var(--timeline-mobile-width); height: 100vh; padding: 0; 
                justify-content: center; /* 讓時間軸固定在螢幕垂直中間 */
                border-right: none; /* 🚀 移除右側垂直線，完全還原手稿 */
            }
            
            .timeline-nav { flex-direction: column; gap: 30px; align-items: flex-start; }
            
            .nav-item { 
                padding: 10px 0 10px 20px; font-size: 0.85rem; width: 100%;
            }
            .nav-item::before { width: 10px; height: 1px; }
            .nav-item:hover::before { width: 15px; }
            .nav-item.active { font-size: 1.1rem; }
            .nav-item.active::before { width: 20px; height: 2px; }

            .selector-container { 
                top: 20px; right: 20px; transform: none; width: max-content; 
                background: rgba(10, 10, 10, 0.95);
            }
            .selector-container.hidden { transform: translateY(-10px); }

            .section { 
                padding: 0 30px; /* 重置 padding，交給 flex 自動置中 */
                align-items: center; /* 🚀 恢復完美置中 */
                scroll-snap-align: center; /* 🚀 磁吸完美置中 */
            }
            .section-track { flex-direction: column; max-height: none; }
            
            .title { font-size: 2rem; margin-bottom: 15px; }
            .description { max-width: 100%; font-size: 0.9rem; margin-bottom: 25px; }
            
            .anchor-wrapper { bottom: 20px; right: 20px; }
            .micro-copy { display: none; } 
            .time-anchor-btn { width: 45px; height: 45px; }
            .time-header { font-size: 0.75rem; }
        }
    </style>
</head>
<body data-active-route="a" data-active-night-route="shop">

    <div id="loader">
        <div id="loader-text">SYNCING DATA...</div>
        <button id="retry-btn" class="retry-btn" onclick="fetchData()" aria-label="重新連線">RETRY</button>
    </div>

    <nav id="day-selector" class="selector-container hidden" aria-label="白天路線選擇"></nav>
    <nav id="night-selector" class="selector-container hidden" aria-label="夜晚路線選擇"></nav>

    <div class="anchor-wrapper">
        <span class="micro-copy" id="sync-hint">SYNC TIME</span>
        <button class="time-anchor-btn" onclick="scrollToCurrentTime()" aria-label="回到當下時間"></button>
    </div>

    <main class="app-layout" id="app-layout">
        <aside class="sidebar">
            <nav class="timeline-nav" id="timeline-nav" aria-label="時間軸導航"></nav>
        </aside>
        
        <section class="content-area scroll-container" id="scroll-area">
            </section>
    </main>

    <script>
        const state = {
            dayRoute: sessionStorage.getItem('axisDayRoute') || 'a',
            nightRoute: sessionStorage.getItem('axisNightRoute') || 'shop',
            hasScrolled: false
        };

        document.addEventListener("DOMContentLoaded", fetchData);

        function fetchData() {
            const loader = document.getElementById('loader');
            const loaderText = document.getElementById('loader-text');
            const retryBtn = document.getElementById('retry-btn');
            
            loaderText.innerText = "SYNCING DATA...";
            retryBtn.style.display = "none";

            fetch(`data.json?v=${new Date().getTime()}`)
                .then(response => {
                    if(!response.ok) throw new Error("JSON Fetch Failed");
                    return response.json();
                })
                .then(data => {
                    renderUI(data);
                    loader.style.opacity = '0';
                    setTimeout(() => {
                        loader.style.display = 'none';
                        document.getElementById('app-layout').style.opacity = '1';
                        initObservers();
                        applySavedState();
                    }, 500);
                })
                .catch(error => {
                    loaderText.innerHTML = "<span class='error-msg'>NETWORK DISCONNECTED</span><br>無法取得行程資料";
                    retryBtn.style.display = "inline-block";
                    console.error(error);
                });
        }

        function renderUI(data) {
            renderSelectors('day-selector', data.config.dayRoutes, 'day');
            renderSelectors('night-selector', data.config.nightRoutes, 'night');

            const navContainer = document.getElementById('timeline-nav');
            const scrollArea = document.getElementById('scroll-area');
            
            navContainer.innerHTML = '';
            scrollArea.innerHTML = '';

            // 1. 動態插入「路線首頁」
            navContainer.insertAdjacentHTML('beforeend', `<a href="#time-overview" class="nav-item active" aria-label="總覽">INFO</a>`);
            
            let overviewRoutesHTML = '';
            data.config.dayRoutes.forEach(route => {
                if(route.overview) {
                    let metaHTML = route.overview.meta.map(m => `<span>${m}</span>`).join('');
                    
                    // 生成 CSS 幾何流程圖
                    let flowHTML = route.overview.steps.map((step, idx, arr) => {
                        let node = `<div class="flow-node">${step}</div>`;
                        let arrow = idx < arr.length - 1 ? `<div class="flow-arrow"></div>` : '';
                        return node + arrow;
                    }).join('');

                    overviewRoutesHTML += `
                        <article class="route-content content-route-${route.id}">
                            <div class="time-header">OVERVIEW / 路線總覽</div>
                            <h1 class="title">${route.overview.title}</h1>
                            <div class="flow-diagram">${flowHTML}</div>
                            <div class="meta-info">${metaHTML}</div>
                        </article>
                    `;
                }
            });

            scrollArea.insertAdjacentHTML('beforeend', `
                <div id="time-overview" class="section" data-phase="overview">
                    <div class="section-track">${overviewRoutesHTML}</div>
                </div>
            `);

            // 2. 動態插入行程
            data.schedule.forEach(point => {
                navContainer.insertAdjacentHTML('beforeend', `<a href="#${point.timeId}" class="nav-item" aria-label="${point.timeLabel}行程">${point.timeLabel}</a>`);

                let routesHTML = '';
                for (const [routeKey, routeData] of Object.entries(point.routes)) {
                    let metaHTML = routeData.meta.map(m => `<span>${m}</span>`).join('');
                    let btnsHTML = routeData.links.map(link => 
                        `<a href="${link.url}" target="_blank" class="nav-btn" aria-label="${link.label}">${link.label}</a>`
                    ).join('');

                    routesHTML += `
                        <article class="route-content content-route-${routeKey}">
                            <div class="time-header">${point.timeLabel} / ${point.action}</div>
                            <h2 class="title">${routeData.title}</h2>
                            <div class="meta-info">${metaHTML}</div>
                            <p class="description">${routeData.description}</p>
                            <div class="btn-group">${btnsHTML}</div>
                        </article>
                    `;
                }

                scrollArea.insertAdjacentHTML('beforeend', `
                    <div id="${point.timeId}" class="section" data-phase="${point.phase}">
                        <div class="section-track">${routesHTML}</div>
                    </div>
                `);
            });
        }

        function renderSelectors(containerId, routesArray, phase) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            routesArray.forEach(route => {
                const btn = document.createElement('button');
                btn.className = `toggle-btn`;
                btn.innerText = route.label;
                btn.dataset.route = route.id;
                btn.setAttribute('aria-label', `切換至${route.label}`);
                btn.onclick = (e) => setRoute(route.id, phase, e.target);
                container.appendChild(btn);
            });
        }

        function setRoute(routeId, phase, btnElement) {
            const container = btnElement.parentElement;
            container.querySelectorAll('.toggle-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');

            if (phase === 'day') {
                document.body.setAttribute('data-active-route', routeId);
                sessionStorage.setItem('axisDayRoute', routeId);
            } else {
                document.body.setAttribute('data-active-night-route', routeId);
                document.body.setAttribute('data-active-route', routeId); 
                sessionStorage.setItem('axisNightRoute', routeId);
            }
        }

        function applySavedState() {
            const savedDayBtn = document.querySelector(`#day-selector .toggle-btn[data-route="${state.dayRoute}"]`);
            if(savedDayBtn) savedDayBtn.classList.add('active');
            
            const savedNightBtn = document.querySelector(`#night-selector .toggle-btn[data-route="${state.nightRoute}"]`);
            if(savedNightBtn) savedNightBtn.classList.add('active');
            
            document.body.setAttribute('data-active-route', state.dayRoute);
        }

        function initObservers() {
            const sections = document.querySelectorAll(".section");
            const navItems = document.querySelectorAll(".nav-item");
            const scrollArea = document.getElementById("scroll-area");
            const daySelector = document.getElementById("day-selector");
            const nightSelector = document.getElementById("night-selector");
            const syncHint = document.getElementById("sync-hint");

            scrollArea.addEventListener('scroll', () => {
                if(!state.hasScrolled) {
                    syncHint.style.opacity = '0';
                    state.hasScrolled = true;
                }
            }, { once: true });

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const id = entry.target.getAttribute("id");
                        const phase = entry.target.getAttribute("data-phase");

                        navItems.forEach(item => item.classList.remove("active"));
                        const activeLink = document.querySelector(`.nav-item[href="#${id}"]`);
                        
                        if (activeLink) {
                            activeLink.classList.add("active");
                            // 🚀 刪除這行惹禍的 scrollIntoView，讓時間軸乖乖待在原地，只移動亮點
                        }

                        if (phase === "day" || phase === "overview") {
                            daySelector.classList.remove("hidden");
                            nightSelector.classList.add("hidden");
                            document.body.setAttribute('data-active-route', sessionStorage.getItem('axisDayRoute') || 'a');
                        } else if (phase === "night") {
                            daySelector.classList.add("hidden");
                            nightSelector.classList.remove("hidden");
                            document.body.setAttribute('data-active-route', sessionStorage.getItem('axisNightRoute') || 'shop');
                        } else {
                            daySelector.classList.add("hidden");
                            nightSelector.classList.add("hidden");
                        }
                    }
                });
            }, { root: scrollArea, rootMargin: "-49% 0px -49% 0px", threshold: 0 });

            sections.forEach(section => observer.observe(section));

            navItems.forEach(item => {
                item.addEventListener('click', function(e) {
                    e.preventDefault();
                    document.getElementById(this.getAttribute('href').substring(1)).scrollIntoView({ behavior: 'smooth' });
                });
            });
        }

        function scrollToCurrentTime() {
            const currentHour = new Date().getHours();
            let targetId = "time-10"; 
            
            if (currentHour >= 22 || currentHour < 4) targetId = "time-22";
            else if (currentHour >= 18) targetId = "time-18";
            else if (currentHour >= 15) targetId = "time-15";
            else if (currentHour >= 13) targetId = "time-13";
            else if (currentHour >= 11) targetId = "time-11";
            else targetId = "time-overview";

            const targetSection = document.getElementById(targetId);
            if (targetSection) {
                targetSection.scrollIntoView({ behavior: 'smooth' });
                document.getElementById("sync-hint").style.opacity = '0';
            }
        }
    </script>
</body>
</html>
