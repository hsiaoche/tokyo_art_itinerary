<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Axis / 多線同步計畫</title>
    <style>
        /* =========================================
           1. Design Tokens (極簡設計變數)
           ========================================= */
        :root {
            --bg-color: #050505;       
            --text-primary: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.4); 
            --line-color: rgba(255, 255, 255, 0.2);
            --accent-color: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.6;
            overflow: hidden; /* 鎖死外層，全交給 content-area 滾動 */
        }

        .scroll-container {
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .scroll-container::-webkit-scrollbar { display: none; }

        /* =========================================
           2. 系統狀態與浮動控制區 (Z-index 最高層)
           ========================================= */
        #loader {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 0.85rem; letter-spacing: 4px; color: var(--text-muted);
            z-index: 999; transition: opacity 0.5s; text-align: center;
        }

        /* 🚀 路線切換器 (全域頂部正中央) */
        .selector-container {
            position: fixed; top: 25px; left: 50%; transform: translateX(-50%);
            z-index: 110; display: flex; gap: 10px;
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            padding: 6px; border-radius: 40px; border: 1px solid var(--line-color);
            transition: opacity 0.3s, transform 0.3s; width: max-content;
        }
        .selector-container.hidden {
            opacity: 0; pointer-events: none; transform: translate(-50%, -20px); 
        }

        .toggle-btn {
            background: transparent; border: none; color: var(--text-muted);
            padding: 8px 24px; border-radius: 30px; font-size: 0.9rem;
            font-weight: 500; cursor: pointer; transition: all 0.3s; outline: none;
        }
        .toggle-btn:hover { color: var(--text-primary); }
        .toggle-btn.active { background: var(--text-primary); color: var(--bg-color); }

        /* 呼吸燈與微文案 */
        .anchor-wrapper {
            position: fixed; bottom: 30px; right: 30px; z-index: 110;
            display: flex; align-items: center; gap: 15px;
        }
        .micro-copy {
            font-size: 0.75rem; letter-spacing: 2px; color: var(--text-muted);
            transition: opacity 0.5s; pointer-events: none;
        }
        @media (max-width: 899px) { .micro-copy { display: none; } }

        .time-anchor-btn {
            width: 50px; height: 50px; border-radius: 50px; background-color: transparent; 
            border: 1px solid transparent; outline: none; display: flex; align-items: center; 
            justify-content: center; cursor: pointer; transition: border 0.3s;
        }
        .time-anchor-btn:hover { border: 1px solid var(--line-color); }
        .time-anchor-btn::after {
            content: ''; display: block; width: 8px; height: 8px; background-color: var(--accent-color); 
            border-radius: 50%; box-shadow: 0 0 10px rgba(255,255,255,0.8); animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.4); }
            70% { box-shadow: 0 0 0 12px rgba(255, 255, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0); }
        }

        /* =========================================
           3. 左側時間軸 (1/3 螢幕高度、純線條)
           ========================================= */
        .sidebar {
            position: fixed; top: 0; left: 0; width: 90px; height: 100vh;
            display: flex; align-items: center; /* 垂直置中 */
            pointer-events: none; /* 防止擋住左側滑動 */
            z-index: 100;
        }

        .timeline-nav {
            display: flex; flex-direction: column; justify-content: center;
            gap: 12px; /* 緊密堆疊 */
            max-height: 33vh; /* 🚀 限制最大高度為畫面的 1/3 */
            pointer-events: auto; /* 允許點擊 */
        }

        .nav-item {
            display: flex; align-items: center; gap: 12px;
            padding-left: 20px; text-decoration: none;
            color: transparent; font-size: 0; /* 🚀 預設隱藏文字 */
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .nav-item::before {
            content: ''; display: block; width: 12px; height: 2px;
            background-color: var(--line-color); transition: all 0.4s ease;
        }

        /* 啟動狀態：線條變長、文字浮現 */
        .nav-item.active {
            color: var(--text-primary); font-size: 1rem; font-weight: 500;
        }
        .nav-item.active::before {
            width: 35px; background-color: var(--accent-color);
        }

        /* =========================================
           4. 全螢幕投影片佈局 (Slideshow Snap)
           ========================================= */
        .app-layout { opacity: 0; transition: opacity 0.8s ease; }

        .content-area {
            width: 100vw; height: 100vh; overflow-y: scroll; 
            scroll-snap-type: y mandatory; scroll-behavior: smooth;
        }

        .section {
            width: 100%; height: 100vh; flex-shrink: 0; /* 🚀 強制每頁 100vh 不妥協 */
            scroll-snap-align: start; scroll-snap-stop: always; 
            display: flex; align-items: center; /* 內容垂直置中 */
            
            /* 安全邊距：上(避開按鈕) 右 下(避開呼吸燈) 左(避開時間軸) */
            padding: 90px 40px 60px 100px; 
            position: relative;
        }
        @media (max-width: 899px) { .section { padding: 100px 30px 40px 90px; } }

        /* =========================================
           5. 內容卡片與流程圖
           ========================================= */
        .section-track { width: 100%; }

        .route-content {
            display: none; animation: fadeIn 0.4s ease forwards;
            width: 100%; 
            max-height: calc(100vh - 160px); /* 🚀 防止內容過長導致跑版，啟用內部滾動 */
            overflow-y: auto; padding-right: 10px;
        }
        
        body[data-active-route="a"] .content-route-a { display: block; }
        body[data-active-route="b"] .content-route-b { display: block; }
        body[data-active-route="shop"] .content-route-shop { display: block; }
        body[data-active-route="intro"] .content-route-intro { display: block; }
        body[data-active-route="dug"] .content-route-dug { display: block; }
        .content-route-all { display: block !important; }

        .time-header {
            font-size: 0.85rem; color: var(--text-muted); letter-spacing: 3px;
            margin-bottom: 16px; display: flex; align-items: center; text-transform: uppercase;
        }
        .time-header::after {
            content: ''; display: inline-block; width: 30px; height: 1px;
            background-color: var(--line-color); margin-left: 15px;
        }

        .title {
            font-size: 2.6rem; font-weight: 300; letter-spacing: 1px;
            margin-bottom: 24px; line-height: 1.2;
        }
        @media (max-width: 899px) { .title { font-size: 2rem; margin-bottom: 15px; } }

        /* CSS 幾何流程圖 */
        .flow-diagram {
            display: flex; align-items: center; flex-wrap: wrap;
            gap: 12px; margin-bottom: 30px;
        }
        .flow-node {
            font-size: 0.85rem; letter-spacing: 1px; padding: 6px 14px; 
            border: 1px solid var(--line-color); border-radius: 30px; color: var(--text-primary);
        }
        .flow-arrow { width: 15px; height: 1px; background-color: var(--line-color); }

        .meta-info {
            font-size: 0.85rem; color: #888; margin-bottom: 24px;
            display: flex; flex-direction: column; gap: 8px;
            border-left: 1px solid var(--line-color); padding-left: 15px;
        }

        .description {
            font-size: 0.95rem; font-weight: 300; color: var(--text-muted);
            max-width: 500px; margin-bottom: 30px; line-height: 1.8;
            white-space: pre-line;
        }

        .btn-group { display: flex; gap: 15px; flex-wrap: wrap; }
        .nav-btn {
            display: inline-flex; align-items: center; justify-content: center;
            padding: 10px 24px; border: 1px solid var(--line-color); border-radius: 50px; 
            color: var(--text-primary); text-decoration: none; font-size: 0.85rem; 
            letter-spacing: 1px; transition: all 0.3s;
        }
        .nav-btn:hover { background: var(--text-primary); color: var(--bg-color); border-color: var(--text-primary); }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 桌面版並排視角 */
        @media (min-width: 900px) {
            .selector-container { display: none !important; }
            .section-track { display: flex; flex-direction: row; }
            .route-content { display: block !important; flex: 1; padding-right: 40px; }
            .content-route-all { flex: 1 1 100%; display: flex; flex-direction: column; }
            .content-route-all .title::before {
                content: ''; display: block; width: 100px; height: 1px;
                background: var(--accent-color); margin-bottom: 20px;
            }
        }
    </style>
</head>
<body data-active-route="a" data-active-night-route="shop">

    <div id="loader">
        <div id="loader-text">SYNCING DATA...</div>
    </div>

    <nav id="day-selector" class="selector-container hidden" aria-label="白天路線選擇"></nav>
    <nav id="night-selector" class="selector-container hidden" aria-label="夜晚路線選擇"></nav>

    <div class="anchor-wrapper">
        <span class="micro-copy" id="sync-hint">SYNC TIME</span>
        <button class="time-anchor-btn" onclick="scrollToCurrentTime()" aria-label="回到當下時間"></button>
    </div>

    <aside class="sidebar">
        <nav class="timeline-nav" id="timeline-nav" aria-label="時間軸導航"></nav>
    </aside>
    
    <main class="app-layout" id="app-layout">
        <section class="content-area scroll-container" id="scroll-area">
            </section>
    </main>

    <script>
        const state = {
            dayRoute: sessionStorage.getItem('axisDayRoute') || 'a',
            nightRoute: sessionStorage.getItem('axisNightRoute') || 'shop',
            hasScrolled: false
        };

        document.addEventListener("DOMContentLoaded", fetchData);

        function fetchData() {
            fetch(`data.json?v=${new Date().getTime()}`)
                .then(res => { if(!res.ok) throw new Error(); return res.json(); })
                .then(data => {
                    renderUI(data);
                    document.getElementById('loader').style.opacity = '0';
                    setTimeout(() => {
                        document.getElementById('loader').style.display = 'none';
                        document.getElementById('app-layout').style.opacity = '1';
                        initObservers();
                        applySavedState();
                    }, 500);
                })
                .catch(() => { document.getElementById('loader-text').innerHTML = "<span class='error-msg'>NETWORK ERROR</span>"; });
        }

        function renderUI(data) {
            renderSelectors('day-selector', data.config.dayRoutes, 'day');
            renderSelectors('night-selector', data.config.nightRoutes, 'night');

            const navContainer = document.getElementById('timeline-nav');
            const scrollArea = document.getElementById('scroll-area');
            
            navContainer.innerHTML = ''; scrollArea.innerHTML = '';

            // 1. 動態插入「路線首頁」
            navContainer.insertAdjacentHTML('beforeend', `<a href="#time-overview" class="nav-item active">INFO</a>`);
            let overviewRoutesHTML = '';
            data.config.dayRoutes.forEach(route => {
                if(route.overview) {
                    let metaHTML = route.overview.meta.map(m => `<span>${m}</span>`).join('');
                    let flowHTML = route.overview.steps.map((step, idx, arr) => {
                        return `<div class="flow-node">${step}</div>` + (idx < arr.length - 1 ? `<div class="flow-arrow"></div>` : '');
                    }).join('');

                    overviewRoutesHTML += `
                        <article class="route-content content-route-${route.id}">
                            <div class="time-header">OVERVIEW</div>
                            <h1 class="title">${route.overview.title}</h1>
                            <div class="flow-diagram">${flowHTML}</div>
                            <div class="meta-info">${metaHTML}</div>
                        </article>
                    `;
                }
            });
            scrollArea.insertAdjacentHTML('beforeend', `<div id="time-overview" class="section" data-phase="overview"><div class="section-track">${overviewRoutesHTML}</div></div>`);

            // 2. 動態插入行程
            data.schedule.forEach(point => {
                navContainer.insertAdjacentHTML('beforeend', `<a href="#${point.timeId}" class="nav-item">${point.timeLabel}</a>`);
                let routesHTML = '';
                for (const [routeKey, routeData] of Object.entries(point.routes)) {
                    let metaHTML = routeData.meta.map(m => `<span>${m}</span>`).join('');
                    let btnsHTML = routeData.links.map(link => `<a href="${link.url}" target="_blank" class="nav-btn">${link.label}</a>`).join('');

                    routesHTML += `
                        <article class="route-content content-route-${routeKey}">
                            <div class="time-header">${point.timeLabel} / ${point.action}</div>
                            <h2 class="title">${routeData.title}</h2>
                            <div class="meta-info">${metaHTML}</div>
                            <p class="description">${routeData.description}</p>
                            <div class="btn-group">${btnsHTML}</div>
                        </article>
                    `;
                }
                scrollArea.insertAdjacentHTML('beforeend', `<div id="${point.timeId}" class="section" data-phase="${point.phase}"><div class="section-track">${routesHTML}</div></div>`);
            });
        }

        function renderSelectors(containerId, routesArray, phase) {
            const container = document.getElementById(containerId);
            container.innerHTML = '';
            routesArray.forEach(route => {
                const btn = document.createElement('button');
                btn.className = `toggle-btn`; btn.innerText = route.label;
                btn.onclick = (e) => setRoute(route.id, phase, e.target);
                container.appendChild(btn);
            });
        }

        function setRoute(routeId, phase, btnElement) {
            btnElement.parentElement.querySelectorAll('.toggle-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
            if (phase === 'day') {
                document.body.setAttribute('data-active-route', routeId);
                sessionStorage.setItem('axisDayRoute', routeId);
            } else {
                document.body.setAttribute('data-active-night-route', routeId);
                document.body.setAttribute('data-active-route', routeId); 
                sessionStorage.setItem('axisNightRoute', routeId);
            }
        }

        function applySavedState() {
            const dayBtn = document.querySelector(`#day-selector .toggle-btn:nth-child(${state.dayRoute === 'a' ? 1 : 2})`);
            if(dayBtn) dayBtn.classList.add('active');
            const nightBtn = document.querySelector(`#night-selector .toggle-btn[onclick*="${state.nightRoute}"]`);
            if(nightBtn) nightBtn.classList.add('active');
            document.body.setAttribute('data-active-route', state.dayRoute);
        }

        function initObservers() {
            const sections = document.querySelectorAll(".section");
            const navItems = document.querySelectorAll(".nav-item");
            const scrollArea = document.getElementById("scroll-area");
            const daySelector = document.getElementById("day-selector");
            const nightSelector = document.getElementById("night-selector");

            scrollArea.addEventListener('scroll', () => {
                if(!state.hasScrolled) { document.getElementById("sync-hint").style.opacity = '0'; state.hasScrolled = true; }
            }, { once: true });

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const id = entry.target.getAttribute("id");
                        const phase = entry.target.getAttribute("data-phase");

                        navItems.forEach(item => item.classList.remove("active"));
                        const activeLink = document.querySelector(`.nav-item[href="#${id}"]`);
                        if (activeLink) activeLink.classList.add("active");

                        if (phase === "day" || phase === "overview") {
                            daySelector.classList.remove("hidden"); nightSelector.classList.add("hidden");
                            document.body.setAttribute('data-active-route', sessionStorage.getItem('axisDayRoute') || 'a');
                        } else if (phase === "night") {
                            daySelector.classList.add("hidden"); nightSelector.classList.remove("hidden");
                            document.body.setAttribute('data-active-route', sessionStorage.getItem('axisNightRoute') || 'shop');
                        } else {
                            daySelector.classList.add("hidden"); nightSelector.classList.add("hidden");
                        }
                    }
                });
            }, { root: scrollArea, rootMargin: "-49% 0px -49% 0px", threshold: 0 });

            sections.forEach(section => observer.observe(section));

            navItems.forEach(item => {
                item.addEventListener('click', function(e) {
                    e.preventDefault();
                    document.getElementById(this.getAttribute('href').substring(1)).scrollIntoView({ behavior: 'smooth' });
                });
            });
        }

        function scrollToCurrentTime() {
            const currentHour = new Date().getHours();
            let targetId = "time-10"; 
            if (currentHour >= 22 || currentHour < 4) targetId = "time-22";
            else if (currentHour >= 18) targetId = "time-18";
            else if (currentHour >= 15) targetId = "time-15";
            else if (currentHour >= 13) targetId = "time-13";
            else if (currentHour >= 11) targetId = "time-11";
            else targetId = "time-overview";

            const targetSection = document.getElementById(targetId);
            if (targetSection) targetSection.scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
